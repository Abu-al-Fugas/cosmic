<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cosmic</title>
<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:Arial,Helvetica,sans-serif;
  color:white;
  height:100%;
}

#space{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

.content{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

h1{
  font-size:70px;
  letter-spacing:6px;
  margin:0;
  background:linear-gradient(90deg,#fff,#9adfff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  opacity:0.7;
  margin-top:10px;
}

.input-container{
  position:relative;
  display:inline-block;
  margin-top:25px;
}

#url{
  padding:12px 35px 12px 12px;
  width:420px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:16px;
  outline:none;
  text-align:center;
}

#clear{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
  opacity:0.5;
  display:none;
}

#preview{
  margin-top:20px;
  max-width:400px;
  max-height:225px;
  border-radius:12px;
  display:none;
}

#quality-container{
  margin-top:15px;
  display:none;
}

button{
  margin-top:20px;
  padding:12px 35px;
  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:16px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

button:hover:enabled{
  background:rgba(255,255,255,0.15);
  transform:scale(1.05);
}

/* спиннер */
.spinner{
  border: 2px solid rgba(255,255,255,0.2);
  border-top: 2px solid #fff;
  border-radius: 50%;
  width: 16px;
  height: 16px;
  animation: spin 0.8s linear infinite;
  display:none;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
</style>
</head>
<body>

<canvas id="space"></canvas>

<div class="content">
  <h1>Cosmic</h1>
  <p>Скачать видео по ссылке</p>

  <div class="input-container">
    <input id="url" placeholder="Вставьте ссылку">
    <span id="clear">&times;</span>
  </div>

  <img id="preview" src="" alt="Preview видео">

  <div id="quality-container">
    <label for="quality">Выберите качество: </label>
    <select id="quality">
      <option value="360">360p</option>
      <option value="720" selected>720p</option>
      <option value="1080">1080p</option>
    </select>
  </div>

  <button id="download">
    Скачать
    <div class="spinner" id="spinner"></div>
  </button>
</div>

<script>
// --- элементы ---
const input = document.getElementById("url");
const clearBtn = document.getElementById("clear");
const downloadBtn = document.getElementById("download");
const preview = document.getElementById("preview");
const qualityContainer = document.getElementById("quality-container");
const qualitySelect = document.getElementById("quality");
const spinner = document.getElementById("spinner");

// --- показать/скрыть крестик ---
function updateUI() {
  clearBtn.style.display = input.value ? "block" : "none";
}
input.addEventListener("input", updateUI);

// --- очистка поля крестиком ---
clearBtn.addEventListener("click", () => {
  input.value = "";
  updateUI();
  preview.style.display = "none";
  qualityContainer.style.display = "none";
});

// --- обработка вставки ссылки ---
input.addEventListener("input", () => {
  const url = input.value;

  // YouTube
  const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/))([\w-]+)/);
  if(ytMatch){
    preview.src = `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
    preview.style.display = "block";
    qualityContainer.style.display = "block";
    return;
  }

  // Instagram
  const igMatch = url.match(/instagram\.com\/p\/([\w-]+)/);
  if(igMatch){
    preview.style.display = "none";
    qualityContainer.style.display = "none";
    return;
  }

  preview.style.display = "none";
  qualityContainer.style.display = "none";
});

// --- скачать видео с анимацией ---
downloadBtn.addEventListener("click", () => {
  const url = input.value;
  if(!url) return;

  // показать спиннер и заблокировать кнопку
  spinner.style.display = "inline-block";
  downloadBtn.disabled = true;

  const selectedQuality = qualitySelect.value;
  const downloadUrl = `/download?url=${encodeURIComponent(url)}&quality=${selectedQuality}`;

  // создаём временный iframe для скачивания, чтобы страница не перезагружалась
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = downloadUrl;
  document.body.appendChild(iframe);

  // скрыть спиннер через 3 секунды (или можно удалить после завершения скачивания)
  setTimeout(()=>{
    spinner.style.display = "none";
    downloadBtn.disabled = false;
    document.body.removeChild(iframe);
  },3000);
});

updateUI();

// --- Космический фон ---
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");
let stars=[], meteors=[], lastMeteor=0;

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener("resize", resize);
resize();

class Star{
  constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.size=Math.random()*2; this.alpha=Math.random(); this.speed=Math.random()*0.02; }
  update(){ this.alpha+=this.speed; if(this.alpha>1||this.alpha<0)this.speed=-this.speed; }
  draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle="rgba(255,255,255,"+this.alpha+")"; ctx.fill(); }
}

class Meteor{
  constructor(){ this.x=Math.random()*canvas.width; this.y=-50; this.len=Math.random()*80+50; this.speed=Math.random()*8+6; this.angle=Math.PI/4; this.alpha=1; }
  update(){ this.x+=this.speed; this.y+=this.speed; this.alpha-=0.01; }
  draw(){ ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x-Math.cos(this.angle)*this.len, this.y-Math.sin(this.angle)*this.len); ctx.strokeStyle="rgba(255,255,255,"+this.alpha+")"; ctx.lineWidth=2; ctx.stroke(); }
}

for(let i=0;i<400;i++) stars.push(new Star());

function spawnMeteor(){ let now=Date.now(); if(now-lastMeteor>4000 && Math.random()<0.004){ meteors.push(new Meteor()); lastMeteor=now; } }

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{s.update();s.draw();});
  spawnMeteor();
  meteors.forEach((m,i)=>{ m.update(); m.draw(); if(m.alpha<=0) meteors.splice(i,1); });
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
