<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial,Helvetica,sans-serif;
color:white;
height:100%;
}

#space{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.content{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

h1{
font-size:40px;
margin:0;
background:linear-gradient(90deg,#fff,#9adfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Прямоугольный блок без обводки для текста */
.subtitle-box{
margin-top:15px;
padding:12px 18px;
border-radius:8px;
background:rgba(255,255,255,0.08);
font-size:15px;
max-width:90%;
}

button{
margin-top:25px;
padding:12px 25px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:rgba(255,255,255,0.2);
transform:scale(1.05);
}

.play-btn{
margin-top:20px;
}

/* бегущая строка */
.ticker{
position:absolute;
bottom:0;
width:100%;
overflow:hidden;
height:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(6px);
z-index:3;
}

.ticker-track{
display:flex;
width:max-content;
animation:scroll 30s linear infinite;
}

.ticker-item{
padding:0 30px;
white-space:nowrap;
opacity:0.8;
font-size:13px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
align-items:center;
justify-content:center;
z-index:10;
opacity:0;
pointer-events:none;
transition:0.6s;
padding:20px;
}

.overlay.active{
opacity:1;
pointer-events:auto;
overflow:auto;
}

.message-box{
max-width:600px;
width:100%;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
backdrop-filter:blur(10px);
text-align:center;
}

.message{
font-size:22px;
line-height:1.5;
word-wrap:break-word;
}

/* частицы */
.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.8;
animation:explode 1.5s ease forwards;
}

@keyframes explode{
0%{transform:translate(0,0); opacity:1;}
100%{transform:translate(var(--x),var(--y)); opacity:0;}
}

/* адаптация */
@media (max-width:600px){
h1{font-size:28px;}
.message{font-size:18px;}
button{font-size:14px;}
.subtitle-box{font-size:14px;}
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="content">
<h1>Эталон Стандарт</h1>

<div class="subtitle-box">
Дорогие братья, коллеги, знакомые… и Абдурахман
</div>

<button onclick="showMessage()">Открыть</button>
</div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<div class="overlay" id="overlay">
<div class="message-box">
<div class="message">
Шу массера мархнаш Дала къобал дойла!!! 🌙
</div>

<button class="play-btn" onclick="playAudio()">▶ Play</button>
</div>
</div>

<audio id="audio" src="https://raw.githubusercontent.com/Abu-al-Fugas/cosmic/main/556677.mp3"></audio>

<script>

// базовые фразы
let phrases = [
"Можно срочно? очень срочно? 😅",
"А если чуть-чуть без очереди?",
"Погрешность почти ноль… почти 🤏",
"Вы точно проверили? 😄",
"Нам нужно было вчера 😂",
"Сколько по времени? 5 минут? 😅",
"Прибор работает... вроде 🤨",
"Это нормально что так показывает?",
"Сделайте красиво 🙏",
"Спасибо, вы спасли нас! 🙌",
"А можно быстрее чем срочно?",
"Вы лучшие ❤️",
"Мы не торопим, но срочно 😄",
"Сделайте как всегда идеально 👍",
"Только вам доверяем 🤝",
"Газовик вац.",
"Свалера вац."
];

// формируем один цикл, без повторов подряд
const tickerTrack = document.getElementById("tickerTrack");

function fillTicker(){
phrases.forEach(text=>{
let div = document.createElement("div");
div.className = "ticker-item";
div.innerText = text;
tickerTrack.appendChild(div);
});
// дублируем полный цикл для бесконечной анимации
phrases.forEach(text=>{
let div = document.createElement("div");
div.className = "ticker-item";
div.innerText = text;
tickerTrack.appendChild(div);
});
}
fillTicker();

// космос
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

let stars=[], meteors=[], lastMeteor=0;

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

class Star{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.size=Math.random()*2;
this.alpha=Math.random();
this.speed=Math.random()*0.02;
}
update(){
this.alpha+=this.speed;
if(this.alpha>1||this.alpha<0)this.speed=-this.speed;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,"+this.alpha+")";
ctx.fill();
}
}

class Meteor{
constructor(){
this.x=Math.random()*canvas.width;
this.y=-50;
this.len=Math.random()*80+50;
this.speed=Math.random()*8+6;
this.angle=Math.PI/4;
this.alpha=1;
}
update(){
this.x+=this.speed;
this.y+=this.speed;
this.alpha-=0.01;
}
draw(){
ctx.beginPath();
ctx.moveTo(this.x,this.y);
ctx.lineTo(this.x-Math.cos(this.angle)*this.len,this.y-Math.sin(this.angle)*this.len);
ctx.strokeStyle="rgba(255,255,255,"+this.alpha+")";
ctx.lineWidth=2;
ctx.stroke();
}
}

for(let i=0;i<400;i++) stars.push(new Star());

function spawnMeteor(){
let now=Date.now();
if(now-lastMeteor>4000 && Math.random()<0.004){
meteors.push(new Meteor());
lastMeteor=now;
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{s.update();s.draw()});
spawnMeteor();

meteors.forEach((m,i)=>{
m.update();
m.draw();
if(m.alpha<=0) meteors.splice(i,1);
});

requestAnimationFrame(animate);
}
animate();

// поздравление
function showMessage(){
const overlay=document.getElementById("overlay");
overlay.classList.add("active");

for(let i=0;i<120;i++){
let p=document.createElement("div");
p.className="particle";

let x=(Math.random()-0.5)*600+"px";
let y=(Math.random()-0.5)*600+"px";

p.style.setProperty("--x",x);
p.style.setProperty("--y",y);

p.style.left="50%";
p.style.top="50%";

overlay.appendChild(p);

setTimeout(()=>p.remove(),1500);
}
}

// аудио
function playAudio(){
const audio=document.getElementById("audio");
audio.play();
}

</script>

</body>
</html>
